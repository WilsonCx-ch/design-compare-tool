# 当前 compose 默认不启动 nginx（见项目根目录 docker-compose.yml）。
# 无域名时应用直连：http://<服务器IP>:9000
# 恢复反代 + HTTPS 时：取消 compose 中 nginx/certbot 注释，并确保下方证书路径与域名一致。

upstream nextjs {
    server app:9000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name onemarket.xin www.onemarket.xin;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name onemarket.xin www.onemarket.xin;

    ssl_certificate     /etc/nginx/ssl/live/onemarket.xin/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/onemarket.xin/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50m;

    # Static assets
    location /_next/static {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
